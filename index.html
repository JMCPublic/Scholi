<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scholi – Find Children's Activities Near You</title>
<meta name="description" content="Find trusted holiday clubs, camps and classes near your child's school. Covering Guildford, Surrey and Middlesbrough.">
<meta property="og:title" content="Scholi – Find Children's Activities">
<meta property="og:description" content="Find trusted clubs, camps and classes near your child's school.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#1B6B5E">
<style>
:root{
  --accent:#1B6B5E;
  --accent-h:#145449;
  --accent-xl:#E8F5F2;
  --bg:#F8F7F5;
  --surface:#fff;
  --text:#1A1A1A;
  --text-mid:#4B5563;
  --text-muted:#9CA3AF;
  --border:#E5E7EB;
  --border-strong:#D1D5DB;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── STICKY SEARCH BAR ── */
.sticky-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;transform:translateY(-100%);transition:transform .3s ease;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.sticky-bar.show{transform:translateY(0)}
.sticky-brand{font-weight:800;font-size:1rem;color:var(--accent);letter-spacing:-.5px;white-space:nowrap}
.sticky-dot{display:inline-block;width:5px;height:5px;background:var(--accent);border-radius:50%;margin-left:1px;vertical-align:middle;margin-bottom:2px}
.sticky-summary{flex:1;font-size:.85rem;color:var(--text-mid);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sticky-edit{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
.sticky-edit:hover{background:var(--accent-h)}

/* ── HERO / HEADER ── */
.hero{background:#F7F6F3;padding:32px 16px 40px;border-bottom:1px solid #E5E7EB}
.hero-inner{max-width:640px;margin:0 auto}
.brand{font-size:1.6rem;font-weight:900;letter-spacing:-1px;margin-bottom:4px;color:#1A1A1A}
.brand-dot{display:inline-block;width:7px;height:7px;background:#5FD4C2;border-radius:50%;margin-left:2px;vertical-align:middle;margin-bottom:4px}
.tagline{font-size:.95rem;color:#6B7280;margin-bottom:28px}

/* ── STEP BLOCKS ── */
.step-block{margin-bottom:20px}
.step-label{font-size:.8rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#6B7280;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.step-num{background:var(--accent);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0}

/* ── CATEGORY TILES ── */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cat-tile{background:#fff;border:1.5px solid #E5E7EB;border-radius:10px;padding:12px 6px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .18s;color:#374151;font-size:.8rem;font-weight:600;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.cat-tile:hover{background:#F0FDFB;border-color:var(--accent)}
.cat-tile.active{background:rgba(255,255,255,.95);color:var(--accent);border-color:rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.cat-tile.active .tile-icon-box svg{stroke:var(--accent)}
.tile-icon-box{width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.tile-icon-box svg{stroke:#6B7280;transition:stroke .18s}
.tile-label{}

/* Per-category active colours */
.cat-tile[data-cat="Sports"].active{color:#1B6B5E}
.cat-tile[data-cat="Sports"].active .tile-icon-box svg{stroke:#1B6B5E}
.cat-tile[data-cat="Drama"].active{color:#6D28D9}
.cat-tile[data-cat="Drama"].active .tile-icon-box svg{stroke:#6D28D9}
.cat-tile[data-cat="Dance"].active{color:#B45309}
.cat-tile[data-cat="Dance"].active .tile-icon-box svg{stroke:#B45309}
.cat-tile[data-cat="Learning"].active{color:#3730A3}
.cat-tile[data-cat="Learning"].active .tile-icon-box svg{stroke:#3730A3}
.cat-tile[data-cat="General"].active{color:#C2410C}
.cat-tile[data-cat="General"].active .tile-icon-box svg{stroke:#C2410C}
.cat-tile[data-cat="Creative"].active{color:#B91C1C}
.cat-tile[data-cat="Creative"].active .tile-icon-box svg{stroke:#B91C1C}

.cat-all-row{margin-top:8px}
.cat-all{width:100%;border-radius:8px;padding:9px;font-size:.82rem;background:#F3F4F6;border-color:#D1D5DB;color:#6B7280}

/* ── WHERE + DISTANCE ── */
.where-row{display:flex;gap:8px;align-items:stretch}
.loc-input{flex:1;background:#fff;border:1.5px solid #D1D5DB;border-radius:8px;padding:11px 14px;font-size:.95rem;color:var(--text);outline:none;min-width:0}
.loc-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(27,107,94,.12)}
.dist-select{background:#fff;border:1.5px solid #D1D5DB;border-radius:8px;padding:11px 12px;font-size:.85rem;color:var(--text);cursor:pointer;outline:none;flex-shrink:0}
.quick-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.quick-chip{background:#fff;border:1.5px solid #D1D5DB;border-radius:20px;padding:5px 12px;font-size:.78rem;color:#4B5563;cursor:pointer;transition:all .15s;font-weight:500}
.quick-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-xl)}

/* ── FILTER PANELS ── */
.filt-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.filt-btn{background:#fff;border:1.5px solid #D1D5DB;border-radius:20px;color:#4B5563;padding:7px 14px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px}
.filt-btn:hover{border-color:var(--accent);color:var(--accent)}
.filt-btn.active,.filt-btn.panel-open{background:rgba(255,255,255,.9);color:var(--accent);border-color:rgba(255,255,255,.9)}
.filt-icon{width:14px;height:14px}
.filt-chevron{font-size:.65rem;opacity:.7;margin-left:2px}

.filt-panel{display:none;background:rgba(255,255,255,.97);border-radius:12px;padding:16px;margin-bottom:8px;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.filt-panel.open{display:block}
.filt-panel-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:10px}
.filt-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip-label{display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.chip-label input{display:none}
.chip{background:#F3F4F6;border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.8rem;font-weight:500;color:var(--text-mid);transition:all .15s;cursor:pointer;user-select:none}
.chip-label input:checked + .chip{background:var(--accent-xl);border-color:var(--accent);color:var(--accent);font-weight:700}
.chip-label:hover .chip{border-color:var(--accent);color:var(--accent)}

.date-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.date-input{background:#F3F4F6;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:.85rem;color:var(--text);outline:none}
.date-input:focus{border-color:var(--accent);background:#fff}
.date-note{font-size:.75rem;color:var(--text-muted);margin-top:6px}
.date-clear-btn{background:none;border:none;color:var(--text-muted);font-size:.78rem;cursor:pointer;padding:4px 8px;border-radius:4px;display:none}
.date-clear-btn.show{display:inline-block}
.date-clear-btn:hover{color:var(--text);background:#F3F4F6}

/* ── SEARCH BUTTON ── */
.search-btn-wrap{margin-top:4px}
.search-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .18s;letter-spacing:-.2px}
.search-btn:hover{background:var(--accent-h);box-shadow:0 4px 16px rgba(27,107,94,.3)}
.search-btn:disabled{opacity:.6;cursor:not-allowed}

/* ── RESULTS SECTION ── */
.results-section{max-width:700px;margin:0 auto;padding:20px 16px 60px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.results-count{font-size:.88rem;color:var(--text-mid)}
.count-num{font-size:1.6rem;font-weight:800;color:var(--text);line-height:1;display:block}
.clear-filters-btn{background:none;border:1.5px solid var(--border-strong);border-radius:6px;color:var(--text-mid);font-size:.78rem;font-weight:600;padding:6px 12px;cursor:pointer;display:none;transition:all .15s}
.clear-filters-btn.show{display:inline-flex;align-items:center;gap:4px}
.clear-filters-btn:hover{border-color:var(--text-mid);color:var(--text);background:#F3F4F6}

/* ── CARDS ── */
.cards-grid{display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:box-shadow .18s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1)}
.card-cat-strip{height:4px;background:var(--accent)}
.card[data-cat="Sports"] .card-cat-strip{background:#1B6B5E}
.card[data-cat="Drama"] .card-cat-strip{background:#6D28D9}
.card[data-cat="Dance"] .card-cat-strip{background:#B45309}
.card[data-cat="Learning"] .card-cat-strip{background:#3730A3}
.card[data-cat="General"] .card-cat-strip{background:#C2410C}
.card[data-cat="Creative"] .card-cat-strip{background:#B91C1C}
.card-inner{padding:16px}

.card-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.card-avatar{width:44px;height:44px;border-radius:10px;background:var(--accent-xl);color:var(--accent);font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:-.5px}
.card[data-cat="Drama"] .card-avatar{background:#F0ECF8;color:#6D28D9}
.card[data-cat="Dance"] .card-avatar{background:#FEF5E7;color:#B45309}
.card[data-cat="Learning"] .card-avatar{background:#EEF2FF;color:#3730A3}
.card[data-cat="General"] .card-avatar{background:#FFF1E6;color:#C2410C}
.card[data-cat="Creative"] .card-avatar{background:#FEF2F2;color:#B91C1C}

.card-title-block{flex:1;min-width:0}
.card-name{font-size:1rem;font-weight:700;color:var(--text);line-height:1.25;margin-bottom:5px}
.card-badges-row{display:flex;flex-wrap:wrap;gap:4px}
.badge{border-radius:20px;padding:2px 8px;font-size:.72rem;font-weight:600;white-space:nowrap}
.badge-cat{background:var(--accent-xl);color:var(--accent)}
.card[data-cat="Drama"] .badge-cat{background:#F0ECF8;color:#6D28D9}
.card[data-cat="Dance"] .badge-cat{background:#FEF5E7;color:#B45309}
.card[data-cat="Learning"] .badge-cat{background:#EEF2FF;color:#3730A3}
.card[data-cat="General"] .badge-cat{background:#FFF1E6;color:#C2410C}
.card[data-cat="Creative"] .badge-cat{background:#FEF2F2;color:#B91C1C}
.badge-dist{background:#F3F4F6;color:#374151}

.card-price-block{text-align:right;flex-shrink:0}
.price-from{font-size:.7rem;color:var(--text-muted)}
.price-main{font-size:1.25rem;font-weight:800;color:var(--text);line-height:1}

.card-desc{font-size:.875rem;color:var(--text-mid);line-height:1.5;margin-bottom:10px}

.card-info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;background:#FAFAFA;border-radius:8px;padding:10px}
.info-item{text-align:center}
.info-label{display:block;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);margin-bottom:2px}
.info-value{font-size:.8rem;font-weight:600;color:var(--text)}

.card-trust-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.trust-badge{font-size:.7rem;font-weight:600;padding:3px 8px;border-radius:20px}
.trust-verified{background:#ECFDF5;color:#065F46}
.trust-dbs{background:#EFF6FF;color:#1E40AF}
.trust-insured{background:#F5F3FF;color:#5B21B6}
.trust-reviews{background:#FFFBEB;color:#92400E}

.card-cta-row{display:flex;gap:8px;margin-bottom:0}
.enquire-btn{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .18s}
.enquire-btn:hover{background:var(--accent-h)}
.card[data-cat="Drama"] .enquire-btn{background:#6D28D9}
.card[data-cat="Drama"] .enquire-btn:hover{background:#5B21B6}
.card[data-cat="Dance"] .enquire-btn{background:#B45309}
.card[data-cat="Dance"] .enquire-btn:hover{background:#92400E}
.card[data-cat="Learning"] .enquire-btn{background:#3730A3}
.card[data-cat="Learning"] .enquire-btn:hover{background:#312E81}
.card[data-cat="General"] .enquire-btn{background:#C2410C}
.card[data-cat="General"] .enquire-btn:hover{background:#9A3412}
.card[data-cat="Creative"] .enquire-btn{background:#B91C1C}
.card[data-cat="Creative"] .enquire-btn:hover{background:#991B1B}
.details-btn{background:none;border:1.5px solid var(--border-strong);border-radius:8px;padding:10px 14px;font-size:.84rem;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all .15s;white-space:nowrap}
.details-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-xl)}

.card-contact{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.card-contact.open{display:block}
.address-row{font-size:.82rem;color:var(--text-mid);margin-bottom:8px}
.contact-links{display:flex;flex-wrap:wrap;gap:8px}
.contact-link{font-size:.8rem;color:var(--accent);text-decoration:none;background:var(--accent-xl);border-radius:6px;padding:4px 10px;display:inline-flex;align-items:center;gap:4px}
.contact-link:hover{background:#D1FAF0}

/* ── NO RESULTS ── */
.no-results{text-align:center;padding:40px 20px;color:var(--text-mid)}
.no-icon{font-size:2.5rem;margin-bottom:12px}
.no-results h3{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:8px}
.no-results p{font-size:.88rem;margin-bottom:16px}
.no-suggestions-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:8px}
.no-suggestion-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.no-chip{background:var(--surface);border:1.5px solid var(--border-strong);border-radius:20px;padding:7px 16px;font-size:.82rem;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all .15s}
.no-chip:hover{border-color:var(--accent);color:var(--accent)}

/* ── STARS ── */
.stars{color:#F59E0B;font-size:.75rem;letter-spacing:1px}
</style>
</head>
<body>

<!-- STICKY SEARCH BAR (appears after first search) -->
<div class="sticky-bar" id="stickyBar">
  <div class="sticky-brand">Scholi<span class="sticky-dot"></span></div>
  <span class="sticky-summary" id="stickySummary"></span>
  <button class="sticky-edit" onclick="scrollToSearch()">Edit search</button>
</div>

<header class="hero" id="heroSection">
<div class="hero-inner">

  <div class="brand">Scholi<span class="brand-dot"></span></div>
  <p class="tagline">Find trusted clubs, camps and classes near your child's school.</p>

  <!-- STEP 1: CATEGORY -->
  <div class="step-block">
    <div class="step-label"><span class="step-num">1</span>Pick your activity</div>
    <div class="cat-grid">
      <button class="cat-tile" data-cat="Sports" onclick="toggleCat(this)">
        <div class="tile-icon-box"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3C10.5 6.5 10.5 9.5 12 12C13.5 9.5 13.5 6.5 12 3"/><path d="M3 11.5C6.5 10 9.5 10 12 12C9.5 14 6.5 14 3 12.5"/><path d="M21 11.5C17.5 10 14.5 10 12 12C14.5 14 17.5 14 21 12.5"/></svg></div>
        <span class="tile-label">Sports</span>
      </button>
      <button class="cat-tile" data-cat="Drama" onclick="toggleCat(this)">
        <div class="tile-icon-box"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5C3 5.5 5 4 7.5 4C10 4 12 5.5 12 7.5L12 10.5C12 12.5 10 14 7.5 14C5 14 3 12.5 3 10.5Z"/><path d="M6 10.5Q7.5 12.5 9 10.5"/><path d="M12 10C12 8 14 6.5 16.5 6.5C19 6.5 21 8 21 10L21 13C21 15 19 16.5 16.5 16.5C14 16.5 12 15 12 13Z"/><path d="M14.5 14Q16.5 12 18.5 14"/></svg></div>
        <span class="tile-label">Drama</span>
      </button>
      <button class="cat-tile" data-cat="Dance" onclick="toggleCat(this)">
        <div class="tile-icon-box"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="4.5" r="2"/><path d="M14 6.5L12 13"/><path d="M12 9L7.5 7"/><path d="M12 9L15.5 11.5"/><path d="M12 13L8 19.5"/><path d="M12 13L17 18"/></svg></div>
        <span class="tile-label">Dance</span>
      </button>
      <button class="cat-tile" data-cat="Learning" onclick="toggleCat(this)">
        <div class="tile-icon-box"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5C4 18 5.5 17 7 17L20 17"/><path d="M7 3L20 3L20 21L7 21C5.5 21 4 20 4 18.5L4 5.5C4 4 5.5 3 7 3Z"/><line x1="4" y1="17" x2="20" y2="17"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="14" x2="13" y2="14"/></svg></div>
        <span class="tile-label">Learning</span>
      </button>
      <button class="cat-tile" data-cat="General" onclick="toggleCat(this)">
        <div class="tile-icon-box"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-6 9 6v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <span class="tile-label">Activity Camp</span>
      </button>
      <button class="cat-tile" data-cat="Creative" onclick="toggleCat(this)">
        <div class="tile-icon-box"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3L21 7L8 20L3 21L4 16Z"/><line x1="14" y1="6" x2="18" y2="10"/><path d="M3 21C4 18 6 17 8 20"/></svg></div>
        <span class="tile-label">Creative</span>
      </button>
    </div>
    <div class="cat-all-row">
      <button class="cat-tile cat-all" id="catAll" onclick="toggleAll(this)">All activities</button>
    </div>
  </div>

  <!-- STEP 2: WHERE + DISTANCE (combined) -->
  <div class="step-block">
    <div class="step-label"><span class="step-num">2</span>Where &amp; how far?</div>
    <div class="where-row">
      <input class="loc-input" id="areaInput" type="text" list="areaList" placeholder="Town, school name or postcode" autocomplete="off">
      <select class="dist-select" id="distSelect">
        <option value="5">Within 5 mi</option>
        <option value="10" selected>Within 10 mi</option>
        <option value="20">Within 20 mi</option>
        <option value="0">Any distance</option>
      </select>
    </div>
    <datalist id="areaList">
      <option value="Guildford">
      <option value="Woking">
      <option value="Cobham">
      <option value="Epsom">
      <option value="Middlesbrough">
      <option value="Stockton">
      <option value="Redcar">
    </datalist>
    <div class="quick-chips">
      <button class="quick-chip" onclick="useLocation('Guildford',51.2362,-0.5704)">Guildford</button>
      <button class="quick-chip" onclick="useLocation('Woking',51.3190,-0.5600)">Woking</button>
      <button class="quick-chip" onclick="useLocation('Cobham',51.3281,-0.4099)">Cobham</button>
      <button class="quick-chip" onclick="useLocation('Epsom',51.3355,-0.2694)">Epsom</button>
      <button class="quick-chip" onclick="useLocation('Middlesbrough',54.5741,-1.2346)">Middlesbrough</button>
      <button class="quick-chip" onclick="useLocation('Stockton',54.5704,-1.3192)">Stockton</button>
      <button class="quick-chip" onclick="useLocation('Redcar',54.6142,-1.0649)">Redcar</button>
    </div>
  </div>

  <!-- STEP 3: NARROW IT DOWN -->
  <div class="step-block">

const selCats=new Set();

// ── HELPERS ──────────────────────────────────────────────────────────────
function hav(la1,lo1,la2,lo2){
  const R=3958.8,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function initials(n){return n.split(' ').filter(w=>w.match(/^[A-Z]/)).slice(0,2).map(w=>w[0]).join('')||n.slice(0,2).toUpperCase()}
function starsHtml(r){
  const full=Math.floor(r),half=(r-full)>=0.25&&(r-full)<0.75,empty=5-full-(half?1:0);
  return '<span class="stars">'+'★'.repeat(full)+(half?'½':'')+'☆'.repeat(empty)+'</span>';
}
function applyFix(i){var s=_suggestions[i];if(s)s();}
function enquire(id){
  var p=P.find(function(x){return x.id===id;});
  if(p)window.location.href='mailto:'+p.email+'?subject=Enquiry%20about%20'+encodeURIComponent(p.name);
}

async function getGeo(q){
  var k=q.toLowerCase().trim();
  if(GEO_CACHE[k])return GEO_CACHE[k];
  // postcode pattern
  var pc=k.replace(/\s+/g,'').toUpperCase();
  if(/^[A-Z]{1,2}[0-9][0-9A-Z]?\s?[0-9][A-Z]{2}$/i.test(pc)||/^[A-Z]{1,2}[0-9]+$/i.test(pc)){
    try{
      var r=await fetch('https://api.postcodes.io/postcodes/'+encodeURIComponent(pc));
      var d=await r.json();
      if(d.result)return{lat:d.result.latitude,lng:d.result.longitude,label:q.toUpperCase()};
    }catch(e){}
  }
  // fallback: nominatim
  try{
    var r2=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q+', UK')+'&format=json&limit=1');
    var d2=await r2.json();
    if(d2.length)return{lat:parseFloat(d2[0].lat),lng:parseFloat(d2[0].lon),label:d2[0].display_name.split(',')[0]};
  }catch(e){}
  return null;
}

// ── FILTERS ───────────────────────────────────────────────────────────────
function applyFilters(p,dr){
  // Age
  var ageChecked=[...document.querySelectorAll('input[name="age"]:checked')].map(function(i){return i.value;});
  if(ageChecked.length){
    var ok=ageChecked.some(function(v){var parts=v.split('-');return p.ageMax>=parseInt(parts[0])&&p.ageMin<=parseInt(parts[1]);});
    if(!ok)return false;
  }
  // Gender
  var genderChecked=[...document.querySelectorAll('input[name="gender"]:checked')].map(function(i){return i.value;});
  if(genderChecked.length&&!genderChecked.includes(p.gender))return false;
  // Session
  var sessChecked=[...document.querySelectorAll('input[name="session"]:checked')].map(function(i){return i.value;});
  if(sessChecked.length&&!sessChecked.some(function(s){return p.sessions.includes(s);}))return false;
  // Day type
  var dayChecked=[...document.querySelectorAll('input[name="daytype"]:checked')].map(function(i){return i.value;});
  if(dayChecked.includes('weekdays')&&!p.weekdays)return false;
  if(dayChecked.includes('weekends')&&!p.weekends)return false;
  // Dates
  if(dr){
    var hasWkd=dr.from?[0,6].includes(dr.from.getDay()):false;
    var hasWke=dr.from?[1,2,3,4,5].includes(dr.from.getDay()):false;
    if(hasWkd&&!p.weekdays)return false;
    if(hasWke&&!p.weekends)return false;
  }
  // Price full
  var pFChecked=[...document.querySelectorAll('input[name="priceF"]:checked')].map(function(i){return i.value;});
  if(pFChecked.length&&p.priceFull){
    var ok2=pFChecked.some(function(v){var parts=v.split('-');return p.priceFull>=parseInt(parts[0])&&p.priceFull<=parseInt(parts[1]);});
    if(!ok2)return false;
  }
  // Price half
  var pHChecked=[...document.querySelectorAll('input[name="priceH"]:checked')].map(function(i){return i.value;});
  if(pHChecked.length&&p.priceHalf){
    var ok3=pHChecked.some(function(v){var parts=v.split('-');return p.priceHalf>=parseInt(parts[0])&&p.priceHalf<=parseInt(parts[1]);});
    if(!ok3)return false;
  }
  // Rating
  var ratingEl=document.querySelector('input[name="rating"]:checked');
  if(ratingEl&&p.rP<parseFloat(ratingEl.value))return false;
  return true;
}

// ── CLEAR ALL FILTERS ─────────────────────────────────────────────────────
function clearAllFilters(){
  document.querySelectorAll('.filt-panel input').forEach(function(i){i.checked=false;});
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  document.getElementById('dateClearBtn').classList.remove('show');
  document.querySelectorAll('.filt-panel').forEach(function(p){p.classList.remove('open');});
  document.querySelectorAll('.filt-btn').forEach(function(b){b.classList.remove('panel-open');b.classList.remove('active');});
  openPanelId=null;
  if(lastGeo){
    var cats=getSelectedCats();
    var maxDist=parseFloat(document.getElementById('distSelect').value);
    var list=P.map(function(p){return Object.assign({},p,{dist:hav(lastGeo.lat,lastGeo.lng,p.lat,p.lng)});})
      .sort(function(a,b){return a.dist-b.dist;})
      .filter(function(p){
        if(cats.length&&!cats.includes(p.cat))return false;
        if(maxDist>0&&p.dist>maxDist)return false;
        return true;
      });
    render(list,lastGeo.label,maxDist,cats);
  }
}

// ── RUN SEARCH ───────────────────────────────────────────────────────────
async function runSearch(){
  var q=document.getElementById('areaInput').value.trim();
  if(!q){alert('Please enter a town, school or postcode.');return;}
  var btn=document.getElementById('searchBtn');
  btn.innerHTML='Searching…';
  btn.disabled=true;
  var g=await getGeo(q);
  if(!g){btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><\/svg> Search';btn.disabled=false;alert('Location not found. Try a different town or postcode.');return;}
  lastGeo=g;
  var cats=getSelectedCats();
  var maxDist=parseFloat(document.getElementById('distSelect').value);
  var dr=getDateRange();
  var anyRefine=[...document.querySelectorAll('.filt-panel input:checked')].length>0||!!dr;
  var list=P.map(function(p){return Object.assign({},p,{dist:hav(g.lat,g.lng,p.lat,p.lng)});})
    .sort(function(a,b){return a.dist-b.dist;})
    .filter(function(p){
      if(cats.length&&!cats.includes(p.cat))return false;
      if(maxDist>0&&p.dist>maxDist)return false;
      if(anyRefine&&!applyFilters(p,dr))return false;
      return true;
    });
  render(list,g.label,maxDist,cats);
  btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><\/svg> Search';
  btn.disabled=false;
  var catLabel=cats.length?cats.join(', '):'All activities';
  var distLabel=maxDist>0?' · within '+maxDist+' mi':'';
  document.getElementById('stickySummary').innerHTML='<strong>'+catLabel+'</strong> near <strong>'+g.label+'</strong>'+distLabel;
  document.getElementById('stickyBar').classList.add('show');
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(list,locLabel,maxDist,cats){
  var sec=document.getElementById('results');
  sec.style.display='block';
  var distTxt=maxDist>0?'within '+maxDist+' miles of':'near';
  var catTxt=cats.length?cats.join(', '):'all activities';
  var dr=getDateRange();
  var anyFilters=document.querySelectorAll('.filt-panel input:checked').length>0||!!dr;

  if(!list.length){
    _suggestions=[];
    var newDist=maxDist===5?'10':'20';
    if(maxDist>0&&maxDist<20)_suggestions.push(function(){document.getElementById('distSelect').value=newDist;runSearch();});
    if(cats.length)_suggestions.push(function(){document.querySelectorAll('.cat-tile').forEach(function(b){b.classList.remove('active');});selCats.clear();document.getElementById('catAll').classList.add('active');runSearch();});
    if(document.querySelectorAll('input[name="when"]:checked').length)_suggestions.push(function(){document.querySelectorAll('input[name="when"]').forEach(function(i){i.checked=false;});onChipChange();runSearch();});
    if(document.querySelectorAll('input[name="gender"]:checked').length)_suggestions.push(function(){document.querySelectorAll('input[name="gender"]').forEach(function(i){i.checked=false;});onChipChange();runSearch();});
    var labels=['Try '+(maxDist===5?10:20)+' miles','Try all activities','Any day of week','Any gender'];
    var sugHtml='';
    if(_suggestions.length){
      sugHtml='<p class="no-suggestions-title">Quick fixes</p><div class="no-suggestion-chips">';
      for(var si=0;si<_suggestions.length;si++){sugHtml+='<button class="no-chip" onclick="applyFix('+si+')">'+labels[si]+'</button>';}
      sugHtml+='</div>';
    }
    sec.innerHTML='<div class="no-results"><div class="no-icon">&#128269;</div><h3>No '+catTxt+' found near '+locLabel+'</h3><p>Try adjusting your filters or expanding the search distance.</p>'+sugHtml+'</div>';
    sec.scrollIntoView({behavior:'smooth'});
    return;
  }

  var drLabel=dr?' &nbsp;&#183;&nbsp; <strong style="color:#1B6B5E">'+dr.label+'</strong>':'';
  var clearBtnHtml=anyFilters?'<button class="clear-filters-btn show" onclick="clearAllFilters()">&#10005; Clear filters</button>':'<button class="clear-filters-btn"></button>';

  var html='<div class="results-header">'
    +'<div class="results-count"><span class="count-num">'+list.length+'</span><br>'
    +'<span style="font-size:.78rem;color:#4B5563">'+catTxt+' '+distTxt+' <strong style="color:#1A1A1A">'+locLabel+'</strong>'+drLabel+'</span></div>'
    +clearBtnHtml
    +'</div>'
    +'<div class="cards-grid">';

  for(var i=0;i<list.length;i++){
    var p=list[i];
    var distBadge=p.dist<50?p.dist.toFixed(1)+' mi':'';
    var sessStr=p.sessions.join(' \xb7 ');
    var priceFrom=p.priceHalf?'&#163;'+p.priceHalf:p.priceFull?'&#163;'+p.priceFull:'';
    var priceSub=p.priceHalf?'half day':p.priceFull?'full day':'';
    var init=initials(p.name);
    var distBadgeHtml=distBadge?'<span class="badge badge-dist">'+distBadge+'</span>':'';
    var priceHtml=priceFrom
      ?'<div class="price-from">from</div><div class="price-main">'+priceFrom+'</div><div class="price-from">'+priceSub+'</div>'
      :'<div class="price-from" style="margin-top:4px">See website</div>';
    var dbsHtml=p.insured?'<span class="trust-badge trust-dbs">&#10003; DBS checked</span>':'';
    var insHtml=p.insured?'<span class="trust-badge trust-insured">&#10003; Insured</span>':'';
    var phoneClean=p.phone.replace(/\s/g,'');

    html+='<div class="card" data-cat="'+p.cat+'">'
      +'<div class="card-cat-strip"></div>'
      +'<div class="card-inner">'
      +'<div class="card-top">'
      +'<div class="card-avatar">'+init+'</div>'
      +'<div class="card-title-block">'
      +'<div class="card-name">'+p.name+'</div>'
      +'<div class="card-badges-row">'
      +'<span class="badge badge-cat">'+p.cat+'</span>'
      +distBadgeHtml
      +'<span class="badge" style="background:#F3F4F6;color:#4B5563">'+p.gender+'</span>'
      +'</div>'
      +'</div>'
      +'<div class="card-price-block">'+priceHtml+'</div>'
      +'</div>'
      +'<p class="card-desc">'+p.desc+'</p>'
      +'<div class="card-info-grid">'
      +'<div class="info-item"><span class="info-label">Ages</span><span class="info-value">'+p.ageMin+'&ndash;'+p.ageMax+' yrs</span></div>'
      +'<div class="info-item"><span class="info-label">Session</span><span class="info-value">'+sessStr+'</span></div>'
      +'<div class="info-item"><span class="info-label">Parents</span><span class="info-value">'+starsHtml(p.rP)+' <span style="font-size:.7rem;color:#1A1A1A">'+p.rP+'</span></span></div>'
      +'</div>'
      +'<div class="card-trust-row">'
      +'<span class="trust-badge trust-verified">&#10003; Verified provider</span>'
      +dbsHtml
      +insHtml
      +'<span class="trust-badge trust-reviews">&#9733; '+p.rP+' ('+p.rPN+' parent reviews)</span>'
      +'</div>'
      +'<div class="card-cta-row">'
      +'<button class="enquire-btn" onclick="enquire('+p.id+')">Enquire now</button>'
      +'<button class="details-btn" id="details-btn-'+p.id+'" onclick="toggleContact('+p.id+')">Details &#8595;</button>'
      +'</div>'
      +'<div class="card-contact" id="contact-'+p.id+'">'
      +'<div class="address-row">&#128205; '+p.addr+', '+p.town+' <strong>'+p.postcode+'</strong></div>'
      +'<div class="contact-links">'
      +'<a class="contact-link" href="https://'+p.web+'" target="_blank" rel="noopener">&#127760; '+p.web+'</a>'
      +'<a class="contact-link" href="tel:'+phoneClean+'">&#128222; '+p.phone+'</a>'
      +'<a class="contact-link" href="mailto:'+p.email+'">&#9993; '+p.email+'</a>'
      +'</div>'
      +'</div>'
      +'</div>'
      +'</div>';
  }

  html+='</div>';
  sec.innerHTML=html;
  sec.scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
